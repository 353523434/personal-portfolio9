<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Shubham Gupta</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons (FontAwesome via CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .page-container {
            padding: 3rem;
            margin-top: 1rem;
        }
        .page-title {
            font-size: 3rem;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-self: flex-start;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
            border-color: rgba(58, 134, 255, 0.4);
            box-shadow: 0 5px 15px rgba(58, 134, 255, 0.15);
        }
        
        .contact-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }
        
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .info-card {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--card-radius);
            transition: all 0.3s ease;
        }
        
        .info-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(10px);
            border-color: var(--accent-blue);
        }
        
        .info-card i {
            font-size: 2rem;
            color: var(--accent-purple);
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .info-details h3 {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            font-weight: 500;
        }
        
        .info-details p, .info-details a {
            font-size: 1.15rem;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .info-details a:hover {
            color: var(--accent-blue);
        }
        
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: rgba(0, 0, 0, 0.1);
            padding: 2rem;
            border-radius: var(--card-radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-group label {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .form-control:focus {
            border-color: var(--accent-purple);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(131, 56, 236, 0.15);
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: 140px;
        }
        
        .submit-btn {
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(131, 56, 236, 0.3);
        }

        .telegram-btn {
            background: #0088cc !important;
            text-decoration: none;
            color: white;
        }
        
        .telegram-btn:hover {
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3) !important;
        }
        
        .action-buttons {
            display: flex;
            gap: 1rem;
            width: 100%;
            margin-top: 0.5rem;
        }
        
        .action-buttons > * {
            flex: 1;
        }

        .social-link-area {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
            padding: 1rem;
        }

        @media (max-width: 850px) {
            .contact-content {
                grid-template-columns: 1fr;
            }
            .page-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Blur Orbs -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <main class="container" style="padding-top: 2rem;">
        <a href="shubham.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        
        <section class="page-container glass-panel">
            <h2 class="page-title">Get In <span class="highlight">Touch</span></h2>
            
            <div class="contact-content">
                <div class="contact-info">
                    <div class="info-card">
                        <i class="fa-regular fa-envelope"></i>
                        <div class="info-details">
                            <h3>Email</h3>
                            <a href="mailto:guptashubhamgupta43@gmail.com">guptashubhamgupta43@gmail.com</a>
                        </div>
                    </div>
                    
                    <div class="info-card">
                        <i class="fa-solid fa-phone"></i>
                        <div class="info-details">
                            <h3>Phone</h3>
                            <a href="tel:+919919925462">+91 99199 25462</a>
                        </div>
                    </div>
                    
                    <div class="info-card">
                        <i class="fa-solid fa-location-dot"></i>
                        <div class="info-details">
                            <h3>Location</h3>
                            <p>Greater Noida</p>
                        </div>
                    </div>
                    

                    <div class="social-link-area">
                        <a href="https://linkedin.com/in/shubham-gupta-gupta-1a3750319" target="_blank" class="icon-btn" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                        <a href="https://github.com/353523434" target="_blank" class="icon-btn" aria-label="GitHub"><i class="fab fa-github"></i></a>
                        <a href="https://x.com/G19Shubham" target="_blank" class="icon-btn" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
                    </div>
                </div>

                <form class="contact-form" onsubmit="event.preventDefault(); window.open('https://t.me/+919919925462?text=' + encodeURIComponent('Hi Shubham,\n\nName: ' + document.getElementById('name').value + '\nEmail: ' + document.getElementById('email').value + '\n\nMessage: ' + document.getElementById('message').value), '_blank');">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" class="form-control" placeholder="E.g., John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" class="form-control" placeholder="E.g., john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" class="form-control" placeholder="I'd like to discuss a project..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn telegram-btn" style="margin-top: 0.5rem;">
                        Send Message <i class="fa-brands fa-telegram" style="font-size: 1.2rem;"></i>
                    </button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
